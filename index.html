<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mr. Soda — Entrepreneur · Musician · Investor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 60% 80%, rgba(255, 60, 120, 0.1) 0%, transparent 50%); animation: drift 12s ease-in-out infinite alternate; z-index: 0; }
    @keyframes drift { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(2%, 2%) rotate(2deg); } }
    .container { position: relative; z-index: 1; text-align: center; padding: 60px 30px; max-width: 720px; }
    .hello { font-size: 13px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    h1 { font-size: clamp(52px, 10vw, 96px); font-weight: 900; line-height: 1; background: linear-gradient(135deg, #ffffff 0%, #a855f7 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 24px; }
    .tagline { font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 50px; }
    .tagline strong { color: rgba(255,255,255,0.85); font-weight: 600; }
    .pills { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 60px; }
    .pill { padding: 10px 22px; border-radius: 100px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); transition: all 0.3s ease; cursor: default; }
    .pill:hover { border-color: rgba(168, 85, 247, 0.5); background: rgba(168, 85, 247, 0.1); transform: translateY(-2px); }
    .pill.music { border-color: rgba(168, 85, 247, 0.3); }
    .pill.biz { border-color: rgba(6, 182, 212, 0.3); }
    .pill.invest { border-color: rgba(255, 180, 0, 0.3); }
    .status { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
    footer { position: fixed; bottom: 24px; font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="container">
    <p class="hello">Hello, World —</p>
    <h1>Mr. Soda</h1>
    <p class="tagline"><strong>Entrepreneur. Musician. Investor.</strong><br/>Building things that matter. Making music that moves.</p>
    <div class="pills">
      <span class="pill music">🎵 Music & Artist</span>
      <span class="pill biz">⚡ Entrepreneur</span>
      <span class="pill invest">💎 Investor</span>
      <span class="pill">🤖 Powered by Claude</span>
    </div>
    <div class="status"><span class="dot"></span>Day 1 — Building in public</div>
  </div>
  <footer>SITE BUILT WITH AI · MR. SODA · 2026</footer>
</body>
</html>
